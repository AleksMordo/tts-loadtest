---
# Драйверы NVIDIA + container toolkit. Пропускается, если образ ВМ GPU-optimized.
- name: Проверить наличие nvidia-smi
  ansible.builtin.command: nvidia-smi -L
  register: nvidia_smi_check
  changed_when: false
  failed_when: false

- name: Установить драйвер NVIDIA (если образ не GPU-optimized)
  when: not gpu_image_optimized and nvidia_smi_check.rc != 0
  block:
    - name: Установить ubuntu-drivers-common
      ansible.builtin.apt:
        name: ubuntu-drivers-common
        state: present
        update_cache: true

    - name: Установить рекомендованный драйвер
      ansible.builtin.command: ubuntu-drivers install --gpgpu
      changed_when: true

    - name: Перезагрузить хост для активации драйвера
      ansible.builtin.reboot:
        reboot_timeout: 600

    # ubuntu-drivers --gpgpu ставит только kernel-часть (linux-modules-nvidia-*);
    # userspace-утилиты (nvidia-smi) доустанавливаем под версию загруженного модуля
    - name: Доустановить nvidia-utils под версию драйвера
      ansible.builtin.shell: |
        set -e
        ver=$(modinfo nvidia | awk '/^version:/{split($2,a,"."); print a[1]}')
        apt-get install -y "nvidia-utils-${ver}-server" 2>/dev/null \
          || apt-get install -y "nvidia-utils-${ver}"
      changed_when: true

- name: Добавить ключ репозитория nvidia-container-toolkit
  ansible.builtin.get_url:
    url: https://nvidia.github.io/libnvidia-container/gpgkey
    dest: /usr/share/keyrings/nvidia-container-toolkit.asc
    mode: "0644"

- name: Добавить репозиторий nvidia-container-toolkit
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit.asc]
      https://nvidia.github.io/libnvidia-container/stable/deb/$(ARCH) /
    filename: nvidia-container-toolkit
    state: present

- name: Установить nvidia-container-toolkit
  ansible.builtin.apt:
    name: nvidia-container-toolkit
    state: present
    update_cache: true

- name: Проверить, что GPU виден
  ansible.builtin.command: nvidia-smi -L
  register: nvidia_smi_final
  changed_when: false
