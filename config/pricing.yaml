# ЗАПОЛНЕНО из фактического биллинга YC (экспорт 20260604-20260731.csv, июль 2026).
# Юнит-цены восстановлены делением cost/quantity по SKU:
#   A100 GPU: 408.12 ₽/gpu*час | vCPU (AMD EPYC): 0.9882 ₽/core*час
#   RAM: 0.3074 ₽/ГБ*час | SSD: 0.0199 ₽/ГБ*час | Публичный IP: 0.2635 ₽/час
# gpu_vm_per_hour = 408.12 + 28×0.9882 + 119×0.3074 (gpu-standard-v3: 1×A100/28vCPU/119GB)

currency: RUB
vat_included: true   # цены = фактические списания с аккаунта (как в биллинге)

components:
  gpu_vm_per_hour: 472.37   # ВМ целиком: GPU + vCPU + RAM
  disk_per_hour: 2.99       # SSD 150 GB × 0.0199
  public_ip_per_hour: 0.26

# Доля времени, когда бот реально говорит в линии (0.3–0.5)
duty_cycle: 0.4

# Запас ёмкости на пики при расчёте числа инстансов под X линий
peak_headroom: 1.3

# Часов в месяце для расчёта ₽/месяц
hours_per_month: 720
